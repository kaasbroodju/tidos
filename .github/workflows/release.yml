name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: |
          cargo test --package tidos --tests --verbose
          cargo test -p tidos --features "i18n,rocket,axum,actix-web,warp" --test i18n --verbose

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_if_not_exists() {
            local package=$1
            local version=$(cargo metadata --no-deps --format-version 1 | jq -r ".packages[] | select(.name==\"$package\") | .version")
            if curl -sf "https://crates.io/api/v1/crates/$package/$version" > /dev/null; then
              echo "$package@$version already exists on crates.io, skipping"
            else
              cargo publish -p "$package" --verbose
            fi
          }

          publish_if_not_exists tidos_macro
          publish_if_not_exists tidos_i18n
          sleep 60
          cargo publish -p tidos --verbose
